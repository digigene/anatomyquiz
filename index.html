<!DOCTYPE html>

<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 420px;
      width: 100%;
      background: rgba(255, 255, 255, 0.07);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      padding: 48px 32px 40px;
    }

    .icon {
      width: 96px;
      height: 96px;
      border-radius: 22px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      font-size: 48px;
      box-shadow: 0 8px 32px rgba(233, 69, 96, 0.4);
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .tagline {
      font-size: 0.95rem;
      color: rgba(255, 255, 255, 0.65);
      line-height: 1.5;

    }

    .redirect-notice {

      color: rgba(255, 255, 255, 0.55);
      margin-bottom: 28px;
    }

    .store-buttons {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .store-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 14px 24px;
      border-radius: 14px;
      text-decoration: none;
      font-weight: 600;
      font-size: 0.95rem;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
    }

    .store-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.35);
    }

    .store-btn:active {
      transform: translateY(0);
      opacity: 0.85;
    }

    .store-btn svg {
      flex-shrink: 0;
    }

    .btn-play {
      background: #01875f;
      color: #fff;
    }

    .btn-apple {
      background: #fff;
      color: #000;
    }

    .footer {
      margin-top: 32px;
      font-size: 0.75rem;
      color: rgba(255, 255, 255, 0.35);

</head>
<body>
  <div class="card">

    <p class="footer">© 2024 Digigene. All rights reserved.</p>

  <script>
    (function () {
      // Store URLs — update these when the app is published
      var PLAY_STORE_URL  = "https://play.google.com/store/apps/details?id=com.digigene.mobilebodyquiz.mobile_body_quiz";
      var APP_STORE_URL   = "https://apps.apple.com/sr/app/anatomy-quiz-trivia-body-game/id6605926572";
      var REDIRECT_DELAY  = 1500; // ms before auto-redirect

      var ua = navigator.userAgent || "";
      var isAndroid = /android/i.test(ua);
      var isIOS     = /iphone|ipad|ipod/i.test(ua);

      var notice = document.getElementById("redirect-notice");

      if (isAndroid) {
        notice.textContent = "Redirecting you to Google Play…";
        setTimeout(function () { window.location.href = PLAY_STORE_URL; }, REDIRECT_DELAY);
      } else if (isIOS) {
        notice.textContent = "Redirecting you to the App Store…";
        setTimeout(function () { window.location.href = APP_STORE_URL; }, REDIRECT_DELAY);
      }
      // Desktop / unknown: just show both buttons without auto-redirect
    })();
